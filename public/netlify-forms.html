<!DOCTYPE html>
<html>
  <head><title>Netlify Forms Declaration</title></head>
  <body>
    <!-- Hidden form declaration for Netlify Forms detection -->
    <form name="contact" netlify data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input name="inquiry-type" />
      <input name="inquiry-type-display" />
      <input name="name" />
      <input name="email" />
      <input name="subject" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
